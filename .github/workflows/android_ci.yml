name: NeriPlayer Android CI

on:
  push:
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gradle-tests:
    name: Gradle tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run unit tests and lint
        run: ./gradlew :app:testDebugUnitTest :app:lintDebug --warning-mode all --stacktrace

      - name: Upload Gradle test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**/*.xml
            **/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  android-instrumented-tests:
    name: Android instrumented tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          sudo sh -c 'echo "KERNEL==\"kvm\", GROUP=\"kvm\", MODE=\"0666\", OPTIONS+=\"static_node=kvm\"" > /etc/udev/rules.d/99-kvm4all.rules'
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run connected Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest --warning-mode all --stacktrace

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumented-test-reports
          path: |
            **/build/reports/androidTests/connected/**
            **/build/outputs/androidTest-results/connected/**
          if-no-files-found: ignore

  worker-check:
    name: Worker check
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: np-submodule/NeriPlayer-LTW/package-lock.json

      - name: Install Worker dependencies
        run: npm ci --prefix np-submodule/NeriPlayer-LTW

      - name: Run Worker check
        run: npm run check --prefix np-submodule/NeriPlayer-LTW

  build:
    runs-on: ubuntu-latest
    if: ${{ (github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[skip ci]')) && (github.ref == 'refs/heads/master' || github.event_name == 'pull_request') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Decode keystore
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          mkdir -p app
          echo "$KEYSTORE_B64" | base64 -d > app/neri.jks
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build unsigned Release for PR
        if: github.event_name == 'pull_request'
        run: ./gradlew :app:assembleRelease -PallowUnsignedRelease=true --warning-mode all --stacktrace

      - name: Build unsigned Release (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: ./gradlew :app:assembleRelease -PallowUnsignedRelease=true --warning-mode all --stacktrace

      - name: Build signed Release for master
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          ./gradlew :app:assembleRelease \
            -PKEYSTORE_FILE=neri.jks \
            -PKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PKEY_ALIAS=key0 \
            -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }} \
            --warning-mode all --stacktrace

      - name: Upload Release APK
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: neri-apk
          path: app/build/outputs/apk/release/**/*.apk

  upload-telegram:
    needs:
      - build
    runs-on: ubuntu-latest
    if: ${{ success() && github.ref == 'refs/heads/master' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: neri-apk
          path: artifacts

      - name: Find APK file
        id: find_apk
        run: |
          apk=$(ls artifacts/*.apk)
          echo "apk_path=$apk" >> $GITHUB_OUTPUT

      - name: Send APK via Telegram API
        env:
          BOT_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          APK_PATH:    ${{ steps.find_apk.outputs.apk_path }}
          SHA:         ${{ github.sha }}
          COMMIT_MSG:  ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          REPO:        ${{ github.repository }}
        run: |
          echo "Sending $APK_PATH"
          
          safe_commit_msg=$(echo "$COMMIT_MSG" | sed 's/&/&amp;/g; s/</&lt;/g; s/>/&gt;/g')
          
          commit_author="$COMMIT_AUTHOR"
          commit_url="https://github.com/${REPO}/commit/${SHA}"
          
          caption=" <b>检测到新的 GitHub 推送！</b>
          <b>Commit SHA:</b> <code>${SHA}</code>
          
          <pre>${safe_commit_msg}</pre>
          
          <b>提交者:</b> <code>${commit_author}</code>
          <a href=\"${commit_url}\">查看详情</a>"
          
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument" \
            -F chat_id="${CHAT_ID}" \
            -F document=@"${APK_PATH}" \
            -F caption="${caption}" \
            -F parse_mode=HTML
